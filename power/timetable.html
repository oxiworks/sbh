<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>2026 근무 스케줄</title>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <script src="timetable_data.js"></script>
    <style>
        :root {
            --main-blue: #3498db;
            --dark-blue: #2980b9;
            --header-bg: linear-gradient(135deg, #d9ecff 0%, #b9ddff 50%, #a3d2ff 100%);
            --base-font-size: 18px; 
            --today-border: #ff0096; /* 화려한 네온 핑크 */
            --today-glow: rgba(255, 0, 150, 0.2);
            --holiday-pink: #e84393;
        }

        body { 
            font-family: 'Pretendard Variable', sans-serif;
            background-color: #e6f3ff;
            margin: 0; padding: 0;
            display: flex; flex-direction: column; align-items: center;
            overflow-x: hidden;
        }

        #master-wrapper {
            width: 600px; min-width: 600px;
            margin: 20px 0; transform-origin: top center;
        }

        .main-board {
            background: white; border: 2px solid var(--main-blue);
            border-radius: 12px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .top-bar {
            display: flex; align-items: center; justify-content: space-between;
            background: var(--header-bg); padding: 10px 15px; border-bottom: 2px solid var(--main-blue);
        }

        .nav-btn { cursor: pointer; border: none; background: #2f71c1; color: white; font-size: 18px; font-weight: bold; padding: 5px 12px; border-radius: 6px; transition: 0.2s; }
        .nav-btn:hover { background: #1f5aa0; }
        .month-display { font-size: 1.6rem; font-weight: 800; color: #2c3e50; min-width: 120px; text-align: center; }

        /* [수정] 큼직하고 꽉 찬 이름 필터 스타일 */
        .name-grid { display: flex; flex-wrap: wrap; gap: 6px; justify-content: flex-end; max-width: 320px; }
        .name-chip { 
            padding: 2px 10px; border-radius: 6px; background: rgba(255,255,255,0.7); 
            font-size: 15px; cursor: pointer; border: 1.5px solid #ced4da; 
            font-weight: 800; color: #333; transition: all 0.1s; line-height: 1.4;
        }
        .name-chip.active { background: var(--main-blue); color: white; border-color: var(--dark-blue); box-shadow: 0 2px 5px rgba(0,0,0,0.2); }

        .fade-layer { opacity: 0; transition: opacity 0.4s ease-in-out; }
        .fade-layer.show { opacity: 1; }

        .week-block { width: 100%; border-collapse: collapse; table-layout: fixed; border-bottom: 5px solid var(--main-blue) !important; }
        .week-block:last-child { border-bottom: none !important; }
        .week-block td { border: 1px solid #d6eaf8; height: 32px; font-size: var(--base-font-size); line-height: 32px; text-align: center; white-space: nowrap; }

        .index-label { background: #f8fbfe !important; color: #34495e !important; width: 70px; font-size: 13px; font-weight: 700; border-right: 2.5px solid var(--main-blue) !important; }
        .row-지원동 td { border-top: 3.5px solid var(--main-blue) !important; }
        
        /* 근무 상태별 색상 */
        .status-주간 { background-color: #fff9db !important; }
        .status-야간 { background-color: #d1dbe4 !important; }
        .status-당직 { background-color: #ebfbee !important; }
        .status-비번 { background-color: #f1f3f5 !important; }
        .status-휴무 { background-color: #fff5f5 !important; }

        .is-sun { color: var(--holiday-pink) !important; }
        .is-sat { color: #2980b9 !important; }
        .other-month { opacity: 0.2; }

        /* [수정] 화려한 네온 오늘 기둥 효과 */
        @keyframes pulseGlow {
            0% { box-shadow: inset 0 0 5px var(--today-glow); border-color: #ff0096; }
            50% { box-shadow: inset 0 0 15px rgba(0, 212, 255, 0.4); border-color: #00d4ff; }
            100% { box-shadow: inset 0 0 5px var(--today-glow); border-color: #ff0096; }
        }

        .is-today { position: relative; font-weight: 900 !important; }
        .is-today::after {
            content: ""; position: absolute; top: -1px; bottom: -1px; left: -1px; right: -1px;
            border-left: 3px solid var(--today-border); border-right: 3px solid var(--today-border);
            pointer-events: none; z-index: 10; animation: pulseGlow 2s infinite ease-in-out;
        }
        .row-날짜 td.is-today::after { border-top: 3px solid var(--today-border); border-top-left-radius: 4px; border-top-right-radius: 4px; }
        .row-외곽-2 td.is-today::after { border-bottom: 3px solid var(--today-border); border-bottom-left-radius: 4px; border-bottom-right-radius: 4px; }
        .row-날짜 td.is-today { color: var(--today-border) !important; }

        .copyright-bar { text-align: right; margin-top: 8px; font-size: 11px; color: #999; }
    </style>
</head>
<body>

<div id="master-wrapper">
    <div class="main-board">
        <div class="top-bar">
            <div class="nav-group">
                <button class="nav-btn" onclick="changeMonth(-1)">◀</button>
                <span id="currentMonthStr" class="month-display"></span>
                <button class="nav-btn" onclick="changeMonth(1)">▶</button>
            </div>
            <div id="nameGrid" class="name-grid"></div>
        </div>
        <div id="calendarArea" class="fade-layer"></div>
    </div>
    <div class="copyright-bar">© 2026. oxisnail All rights reserved.</div>
</div>

<script>
    const today = new Date();
    const todayStr = `${today.getFullYear()}-${String(today.getMonth() + 1).padStart(2, '0')}-${String(today.getDate()).padStart(2, '0')}`;
    let viewYear = today.getFullYear();
    let viewMonth = today.getMonth() + 1;
    let selectedName = ""; 
    const rowLabels = ["날짜", "공휴일", "근무", "지원동", "글로벌", "외곽-1", "외곽-2"];
    const weekNames = ["일", "월", "화", "수", "목", "금", "토"];

    function adjustScale() {
        const wrapper = document.getElementById('master-wrapper');
        const screenWidth = window.innerWidth;
        const baseWidth = 620; 
        if (screenWidth < baseWidth) {
            const scale = screenWidth / baseWidth;
            wrapper.style.transform = `scale(${scale})`;
            wrapper.style.marginBottom = `-${wrapper.offsetHeight * (1 - scale)}px`;
        } else {
            wrapper.style.transform = 'scale(1)';
            wrapper.style.marginBottom = '0';
        }
    }

    function getNameList() {
        if (typeof scheduleData === 'undefined') return [];
        const names = new Set();
        Object.values(scheduleData).forEach(day => {
            ["지원동", "글로벌", "외곽-1", "외곽-2"].forEach(key => {
                const val = (day[key] || "").toString().trim();
                if (val && !["-","0","nan"].includes(val)) names.add(val);
            });
        });
        return Array.from(names).sort();
    }

    function renderNameSelector() {
        const container = document.getElementById('nameGrid');
        container.innerHTML = "";
        getNameList().forEach(name => {
            const div = document.createElement('div');
            div.className = `name-chip ${selectedName === name ? 'active' : ''}`;
            div.innerText = name;
            div.onclick = () => {
                selectedName = (selectedName === name) ? "" : name;
                renderNameSelector();
                initCalendar(false);
            };
            container.appendChild(div);
        });
    }

    function initCalendar(useFade = true) {
        const area = document.getElementById('calendarArea');
        if (useFade) area.classList.remove('show');

        setTimeout(() => {
            document.getElementById('currentMonthStr').innerText = `${viewYear}년 ${viewMonth}월`;
            area.innerHTML = "";
            
            const first = new Date(viewYear, viewMonth - 1, 1);
            const last = new Date(viewYear, viewMonth, 0);
            const daysArray = [];
            const startDay = first.getDay();
            const prevLast = new Date(viewYear, viewMonth - 1, 0);
            
            for (let p = startDay - 1; p >= 0; p--) daysArray.push(new Date(viewYear, viewMonth - 2, prevLast.getDate() - p));
            for (let d = 1; d <= last.getDate(); d++) daysArray.push(new Date(viewYear, viewMonth - 1, d));
            while (daysArray.length % 7 !== 0) daysArray.push(new Date(viewYear, viewMonth, (daysArray.length % 7 == 0 ? 0 : daysArray.length % 7) + 1));

            for (let i = 0; i < daysArray.length; i += 7) {
                const weekData = daysArray.slice(i, i + 7);
                const table = document.createElement('table');
                table.className = "week-block";
                rowLabels.forEach((label) => {
                    const tr = document.createElement('tr');
                    tr.className = `row-${label}`;
                    const th = document.createElement('td');
                    th.className = "index-label"; th.innerText = label;
                    tr.appendChild(th);

                    weekData.forEach(dateObj => {
                        const td = document.createElement('td');
                        const key = `${dateObj.getFullYear()}-${String(dateObj.getMonth() + 1).padStart(2, '0')}-${String(dateObj.getDate()).padStart(2, '0')}`;
                        const info = scheduleData[key] || {};
                        const holidayName = (info["공휴일"] || "").toString().trim();
                        const isHoliday = holidayName && !["0", "nan", "-"].includes(holidayName);

                        if (key === todayStr) td.classList.add('is-today');
                        if (dateObj.getMonth() + 1 !== viewMonth) td.classList.add('other-month');
                        if (dateObj.getDay() === 0 || isHoliday) td.classList.add('is-sun');
                        else if (dateObj.getDay() === 6) td.classList.add('is-sat');
                        
                        const shiftType = (info["근무"] || "").trim();
                        if (shiftType) td.classList.add('status-' + shiftType);

                        // [요일 표시 복구]
                        let cellText = "";
                        if (label === "날짜") {
                            cellText = `${dateObj.getMonth()+1}/${dateObj.getDate()}(${weekNames[dateObj.getDay()]})`;
                        } else {
                            cellText = (info[label] || "");
                            if (["0", 0, "nan"].includes(cellText)) cellText = "";
                        }
                        
                        if (selectedName && cellText === selectedName) {
                            td.style.backgroundColor = "rgba(52, 152, 219, 0.2)";
                            td.style.color = "var(--dark-blue)";
                            td.style.fontWeight = "bold";
                        }
                        td.innerText = cellText;
                        tr.appendChild(td);
                    });
                    table.appendChild(tr);
                });
                area.appendChild(table);
            }
            area.classList.add('show');
            adjustScale();
        }, useFade ? 100 : 0);
    }

    function changeMonth(diff) {
        viewMonth += diff;
        if (viewMonth > 12) { viewMonth = 1; viewYear++; }
        if (viewMonth < 1) { viewMonth = 12; viewYear--; }
        initCalendar(true);
    }

    window.addEventListener('resize', adjustScale);
    window.onload = () => { 
        if (typeof scheduleData !== 'undefined') { renderNameSelector(); initCalendar(true); }
        adjustScale();
    };
</script>
</body>
</html>
