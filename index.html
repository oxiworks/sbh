<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Timetable</title>
    <style>
        /* 기본 스타일 초기화 및 배경 설정 */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f6f9;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* 상단 제목 스타일 */
        header {
            margin-top: 50px;
            margin-bottom: 40px;
        }
        header h1 {
            font-size: 2.5rem;
            color: #333;
            letter-spacing: 1px;
        }

        /* 메인 컨텐츠 컨테이너 */
        .container {
            width: 100%;
            max-width: 500px;
            padding: 0 20px;
            box-sizing: border-box;
        }

        /* 중간 BIO, POWER 가로 배치 스타일 */
        .row-buttons {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
        }
        .btn-half {
            flex: 1;
            height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #ffffff;
            color: #2c3e50;
            text-decoration: none;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            transition: all 0.2s ease;
            border: 1px solid #e2e8f0;
        }
        .btn-half:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 12px rgba(0,0,0,0.1);
            background-color: #4a90e2;
            color: #ffffff;
            border-color: #4a90e2;
        }

        /* 하단 가로로 긴 버튼 스타일 */
        .btn-full {
            width: 100%;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #34495e;
            color: #ffffff;
            text-decoration: none;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            transition: all 0.2s ease;
        }
        .btn-full:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 12px rgba(0,0,0,0.1);
            background-color: #2c3e50;
        }
    </style>
</head>
<body>

    <header>
        <h1>시간표</h1>
    </header>

    <div class="container">
        <div class="row-buttons">
            <a href="https://sbh.oxisnail.top/bio/" class="btn-half" target="_self">BIO팀</a>
            <a href="https://sbh.oxisnail.top/power/" class="btn-half" target="_self">POWER팀</a>
        </div>

        <a href="https://sbh.oxisnail.top/help.html" class="btn-full" target="_blank">ntfy.sh 시간표 알림 설정법</a>
    </div>

</body>
</html>
